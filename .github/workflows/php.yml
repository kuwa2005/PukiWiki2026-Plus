name: PHP syntax check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Syntax check (php -l)
        run: |
          # lib/mbstring.php は mbstring 拡張未導入時の polyfill。
          # 拡張あり環境で php -l 単体実行すると redeclare となるため除外。
          find . -name '*.php' -not -path './pukiwiki/lib/mbstring.php' -print0 | xargs -0 -n1 php -l
